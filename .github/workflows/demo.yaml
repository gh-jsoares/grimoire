name: Demo

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths:
      - "demo.tape"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build grimoire
        run: go build -o grimoire ./cmd/grimoire

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          go install github.com/charmbracelet/vhs@latest
          sudo apt-get install -y ttyd

      - name: Record demo
        run: vhs demo.tape

      - name: Push to assets branch
        run: |
          cp demo.gif /tmp/demo.gif
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin assets || true
          git checkout --orphan assets-tmp
          git rm -rf .
          cp /tmp/demo.gif demo.gif
          git add demo.gif
          git commit -m "update demo gif"
          git branch -M assets-tmp assets
          git push origin assets --force
