name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/grimoire_darwin_arm64 ./cmd/grimoire
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/grimoire_darwin_amd64 ./cmd/grimoire
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/grimoire_linux_arm64 ./cmd/grimoire
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/grimoire_linux_amd64 ./cmd/grimoire

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/grimoire_darwin_arm64
            dist/grimoire_darwin_amd64
            dist/grimoire_linux_arm64
            dist/grimoire_linux_amd64

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${GITHUB_REF_NAME}
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update changelog for ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:main

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA_ARM64=$(shasum -a 256 dist/grimoire_darwin_arm64 | cut -d' ' -f1)
          SHA_AMD64=$(shasum -a 256 dist/grimoire_darwin_amd64 | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/gh-jsoares/homebrew-tap.git tap
          cd tap

          cat > Formula/grimoire.rb << EOF
          class Grimoire < Formula
            desc "Terminal cheatsheet viewer"
            homepage "https://github.com/gh-jsoares/grimoire"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/gh-jsoares/grimoire/releases/download/v#{version}/grimoire_darwin_arm64"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/gh-jsoares/grimoire/releases/download/v#{version}/grimoire_darwin_amd64"
                sha256 "${SHA_AMD64}"
              end
            end

            def install
              binary = Hardware::CPU.arm? ? "grimoire_darwin_arm64" : "grimoire_darwin_amd64"
              bin.install binary => "grimoire"
            end

            test do
              assert_match "grimoire", shell_output("#{bin}/grimoire --version")
            end
          end
          EOF

          sed -i 's/^          //' Formula/grimoire.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/grimoire.rb
          git commit -m "chore: update grimoire to v${VERSION}"
          git push
